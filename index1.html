<body>
    <h1>Анкета</h1>
    
    <div id="password-screen">
        <h2>Введите пароль для доступа к анкете</h2>
        <input type="password" id="passInput" placeholder="Пароль" style="padding:10px; width:300px; font-size:16px;">
        <button onclick="checkPassword()" style="padding:10px 20px; margin-left:10px;">Войти</button>
        <p id="error" style="color:red; display:none;">Неверный пароль</p>
    </div>

    <div id="form-screen" style="display:none;">
        <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; background: #f5f5f5; }
        form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        label { display: block; margin: 18px 0 6px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .section { margin-top: 30px; padding-top: 15px; border-top: 2px solid #0066cc; }
        button { margin-top: 30px; padding: 14px 40px; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0055aa; }
        .success { color: green; margin-top: 15px; display: none; }
        img { max-width: 100%; height: auto; display: block; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Анкета</h1>
    
    <form id="anketaForm" action="https://formspree.io/f/mkolpwnw" method="POST" enctype="multipart/form-data">
        
        <label>1. Фамилия Имя Отчество</label>
        <input type="text" name="fio" required>

        <label>2. Дата рождения</label>
        <input type="date" name="birth_date" required>

        <label>3. Место рождения</label>
        <input type="text" name="birth_place" required>

        <label>4. Место регистрации</label>
        <input type="text" name="registration_place" required>

        <div class="section">
            <label>5. Паспорт</label>
            <label>5.1 Серия, номер документа</label>
            <input type="text" name="passport_serial">

            <label>5.2 Дата выдачи</label>
            <input type="date" name="passport_date" required>

            <label>5.3 Орган, выдавший документ</label>
            <input type="text" name="passport_issuer">

            <label>5.4 Код подразделения</label>
            <input type="text" name="passport_code">
        </div>

        <div class="section">
            <label>6. Военный билет</label>
            <label>6.1 Серия, номер документа</label>
            <input type="text" name="military_serial" placeholder="АА №000000">

            <label>6.2 Дата выдачи</label>
            <input type="date" name="military_date" required>

            <label>6.3 Орган, выдавший документ</label>
            <input type="text" name="military_issuer">
        </div>

        <div class="section">
            <label>7. Места возможного нахождения</label>
            <label>7.1 Место фактического проживания</label>
            <input type="text" name="actual_residence">

            <label>7.2 Места проживания родственников</label>
            <textarea name="relatives_residence" rows="3" required></textarea>

            <label>7.3 Другие места наиболее вероятного нахождения</label>
            <textarea name="other_locations" rows="3" required> </textarea>
        </div>

        <div class="section">
            <label>8. Образование</label>
            <label>8.1 Полное название учебного учреждения</label>
            <textarea name="education_institution" rows="2" required> </textarea>

            <label>8.2 Специальность / направление</label>
            <textarea name="education_specialty" rows="2" required> </textarea>

            <label>8.3 Дата окончания</label>
            <input type="date" name="education_date">
        </div>

        <label>9. Сведения о судимости</label>
        <textarea name="criminal_record" rows="3" required></textarea>

        <label>10. Используемые номера сотовой связи</label>
        <input type="text" name="phone_numbers">

        <label>11. Номера банковских карт</label>
        <input type="text" name="bank_cards" placeholder="СберБанк 2200 0000 0000 0000">

        <label>12. Аккаунты в социальных сетях</label>
        <textarea name="social_accounts" rows="5" placeholder="MAX:+7(959)-037-24-25&#10;ТЕЛЕГРАМ:+7(959)-037-24-25" required> </textarea>

        <label>13. Личный номер</label>
        <input type="text" name="personal_number" required>

        <label>14. Табельный номер</label>
        <img src="IMG_3628.jpg" alt="Табельный номер" width="500">
        <input type="text" name="service_number" required>

        <label>15. Когда и каким военным комиссариатом призван, номер телефона дежурного</label>
        <textarea name="draft_info" rows="3" required></textarea>

        <label>16. Когда и каким пунктом отбора на контракт отобран</label>
        <textarea name="contract_selection" rows="3"></textarea>

        <label>17. Сведения об оружии и боеприпасах</label>
        <textarea name="weapon_info" rows="4"></textarea>

        <label>18. Особенности внешности</label>
        <textarea name="appearance" rows="4" required> </textarea>

        <label>19. Личные приметы (татуировки, шрамы и т.д.)</label>
        <textarea name="distinctive_features" rows="5" required> </textarea>

        <label>20. Сведения о близких родственниках</label>
        <textarea name="relatives" rows="8"> </textarea>

        <div class="section">
            <label>21. Загрузите фотографии (анфас в гражданской форме, в военной форме в кепке,в военной форме)</label>
            <img src="IMG_3753.JPG" alt="Пример фото" width="500">
            <input type="file" name="photos" accept="image/*" multiple required>
        </div>

        <button type="submit">Отправить анкету</button>
    </form>

    <div id="success" class="success">✅ Анкета успешно отправлена.</div>

    <script>
        const form = document.getElementById('anketaForm');
        const success = document.getElementById('success');

        form.addEventListener('submit', function() {
            success.style.display = 'block';
            setTimeout(() => success.style.display = 'none', 5000);
        });
    </script>
</body>
</html>
    </div>

    <script>
        const correctPass = "МАРКЕР2026";  // ← ИЗМЕНИ НА СВОЙ

        function checkPassword() {
            const input = document.getElementById("passInput").value;
            if (input === correctPass) {
                document.getElementById("password-screen").style.display = "none";
                document.getElementById("form-screen").style.display = "block";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // Enter тоже работает
        document.getElementById("passInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkPassword();
        });
    </script>
